<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Günlüğüm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --paper: #E7E1D3;
    --paper-card: #F7F3E8;
    --ink: #2A2620;
    --ink-soft: #6b6255;
    --wine: #7C2D3B;
    --wine-soft: #a9525f;
    --teal: #2F5D62;
    --rule: #c9bfa8;
    --rule-light: #ddd4bd;
    --shadow: 0 1px 2px rgba(42,38,32,0.06), 0 4px 14px rgba(42,38,32,0.08);
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html, body{
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }
  h1,h2,h3{
    font-family:'Fraunces', serif;
    font-weight: 600;
    margin: 0;
    color: var(--ink);
  }
  ::selection{ background: var(--wine); color: var(--paper-card); }
  button{ font-family: inherit; cursor: pointer; }
  input, textarea{ font-family: inherit; }

  .app{
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ---------- Header ---------- */
  .top-bar{
    display:flex;
    align-items:flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    padding-bottom: 22px;
    margin-bottom: 26px;
    border-bottom: 1px solid var(--rule);
  }
  .brand{ display:flex; align-items:center; gap: 14px; }
  .brand-mark{
    font-size: 30px;
    color: var(--wine);
    transform: rotate(-8deg);
    display:inline-block;
  }
  .brand h1{ font-size: 30px; letter-spacing: 0.2px; }
  .tagline{ margin: 2px 0 0; color: var(--ink-soft); font-size: 13px; font-style: italic; }

  .top-actions{ display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }
  #searchInput{
    background: var(--paper-card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--ink);
    min-width: 200px;
    outline: none;
  }
  #searchInput:focus{ border-color: var(--wine); }
  .btn-primary{
    background: var(--wine);
    color: #F7F0E4;
    border: none;
    border-radius: var(--radius);
    padding: 10px 16px;
    font-weight: 600;
    font-size: 14px;
    box-shadow: var(--shadow);
    transition: background .15s ease, transform .1s ease;
  }
  .btn-primary:hover{ background: var(--wine-soft); }
  .btn-primary:active{ transform: translateY(1px); }
  .btn-ghost{
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 14px;
  }
  .btn-ghost:hover{ border-color: var(--ink-soft); color: var(--ink); }

  /* ---------- Layout ---------- */
  .layout{
    display: grid;
    grid-template-columns: 230px 1fr;
    gap: 34px;
    align-items: start;
  }

  /* ---------- Sidebar (notebook spine) ---------- */
  .sidebar{
    position: relative;
    padding-left: 18px;
    position: sticky;
    top: 20px;
  }
  .spine{
    position:absolute;
    left: -2px;
    top: 0;
    bottom: 0;
    width: 12px;
    background-image: radial-gradient(circle, var(--rule) 2px, transparent 2.4px);
    background-size: 12px 22px;
    background-repeat: repeat-y;
    opacity: 0.9;
  }
  .archive-item{
    display:flex;
    align-items:center;
    justify-content: space-between;
    width: 100%;
    background: none;
    border: none;
    text-align: left;
    padding: 8px 10px;
    border-radius: var(--radius);
    color: var(--ink-soft);
    font-size: 13.5px;
  }
  .archive-item:hover{ background: rgba(124,45,59,0.07); color: var(--ink); }
  .archive-item.active{ background: var(--wine); color: #F7F0E4; font-weight:600; }
  .archive-item.active .count{ color: #F7F0E4; opacity: 0.85; }
  .all-item{ font-family:'Fraunces', serif; font-size:15px; margin-bottom: 8px; font-weight: 600; }
  .count{ font-size: 11px; color: var(--ink-soft); opacity: 0.7; }

  .year-group{ margin-bottom: 6px; }
  .year-label{
    font-family:'Fraunces', serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    color: var(--teal);
    padding: 10px 10px 2px;
    text-transform: uppercase;
  }
  .month-item{ padding-left: 20px; }

  /* ---------- Main content / timeline ---------- */
  .content{ min-height: 300px; }
  .state-msg{
    color: var(--ink-soft);
    text-align:center;
    padding: 60px 20px;
    font-size: 14px;
  }
  .empty-illustration{ margin-bottom: 14px; opacity: 0.85; }

  .timeline{
    position: relative;
    padding-left: 26px;
  }
  .timeline::before{
    content:"";
    position:absolute;
    left: 6px;
    top: 6px;
    bottom: 6px;
    width: 1px;
    background: var(--rule);
  }

  .entry{
    position: relative;
    margin-bottom: 26px;
  }
  .entry-node{
    position:absolute;
    left: -26px;
    top: 6px;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--paper-card);
    border: 2px solid var(--wine);
  }
  .entry-card{
    background: var(--paper-card);
    border: 1px solid var(--rule-light);
    border-radius: var(--radius);
    padding: 18px 20px 16px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .entry-card::before{
    content:"";
    position:absolute;
    top:-6px; left:0; right:0; height:6px;
    background-image: linear-gradient(135deg, var(--paper) 33%, transparent 0), linear-gradient(-135deg, var(--paper) 33%, transparent 0);
    background-position: 0 0;
    background-size: 12px 12px;
    background-repeat: repeat-x;
  }
  .entry-header{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .entry-title{ font-size: 19px; }
  .entry-date{
    font-size: 12px;
    color: var(--wine);
    font-weight: 600;
    white-space: nowrap;
  }
  .entry-tag{
    display:inline-block;
    font-size: 11px;
    color: var(--teal);
    border: 1px solid var(--teal);
    border-radius: 20px;
    padding: 2px 9px;
    margin-bottom: 10px;
  }
  .entry-content{
    white-space: pre-wrap;
    color: var(--ink);
    font-size: 14.5px;
  }
  .entry-actions{
    display:flex; gap: 8px;
    margin-top: 12px;
    opacity: 0;
    transition: opacity .15s ease;
  }
  .entry-card:hover .entry-actions{ opacity: 1; }
  .icon-btn{
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: var(--radius);
  }
  .icon-btn:hover{ background: var(--rule-light); color: var(--ink); }
  .icon-btn.danger:hover{ color: var(--wine); }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position: fixed; inset:0;
    background: rgba(42,38,32,0.45);
    align-items:center; justify-content:center;
    padding: 20px;
    z-index: 50;
  }
  .modal-overlay:not([hidden]){ display:flex; }
  .modal{
    background: var(--paper-card);
    border-radius: var(--radius);
    padding: 26px 26px 20px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
  }
  .modal h2{ font-size: 20px; margin-bottom: 16px; }
  #entryForm label{
    display:block;
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-bottom: 14px;
    font-weight: 600;
  }
  #entryForm input, #entryForm textarea{
    display:block;
    width: 100%;
    margin-top: 5px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 9px 10px;
    color: var(--ink);
    font-weight: 400;
    font-size: 14px;
    outline: none;
  }
  #entryForm input:focus, #entryForm textarea:focus{ border-color: var(--wine); }
  .form-row{ display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-actions{ display:flex; justify-content:flex-end; gap: 10px; margin-top: 6px; }

  .photo-preview{
    margin-top: 8px;
    max-width: 160px;
    max-height: 160px;
    border-radius: var(--radius);
    border: 1px solid var(--rule);
    display: none;
    object-fit: cover;
  }
  .photo-preview.show{ display:block; }
  .photo-remove-btn{
    display:none;
    margin-top: 6px;
    font-size: 12px;
    color: var(--wine-soft);
    background:none; border:none; text-decoration: underline;
    padding: 0;
  }
  .photo-remove-btn.show{ display:inline-block; }

  .entry-photo{
    width: 100%;
    max-height: 320px;
    object-fit: cover;
    border-radius: var(--radius);
    margin-bottom: 12px;
    border: 1px solid var(--rule-light);
    display: block;
  }

  /* ---------- Tag filters ---------- */
  .sidebar-heading{
    font-family:'Fraunces', serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--ink-soft);
    text-transform: uppercase;
    padding: 14px 10px 6px;
    border-top: 1px solid var(--rule-light);
    margin-top: 10px;
  }
  .tag-chips{ display:flex; flex-wrap:wrap; gap: 6px; padding: 4px 10px 6px; }
  .tag-chip{
    background: none;
    border: 1px solid var(--teal);
    color: var(--teal);
    border-radius: 20px;
    font-size: 11.5px;
    padding: 3px 10px;
  }
  .tag-chip.active{ background: var(--teal); color: var(--paper-card); }
  .tag-chip:hover{ opacity: 0.85; }

  /* ---------- Responsive ---------- */
  @media (max-width: 760px){
    .layout{ grid-template-columns: 1fr; }
    .sidebar{ position: static; padding-left: 4px; }
    .spine{ display:none; }
    .archive-tree{ display:flex; flex-wrap:wrap; gap:6px; }
    .year-group{ display:contents; }
    .year-label{ width:100%; }
    .month-item{ padding-left: 10px; }
    .top-bar{ align-items:flex-start; }
    #searchInput{ flex:1; min-width: 0; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="top-bar">
    <div class="brand">
      <span class="brand-mark">✎</span>
      <div>
        <h1>Günlüğüm</h1>
        <p class="tagline">kendime yazdığım satırlar</p>
      </div>
    </div>
    <div class="top-actions">
      <input id="searchInput" type="search" placeholder="Yazılarda ara..." />
      <button id="backupBtn" class="btn-ghost">⬇ Yedek Al</button>
      <button id="newEntryBtn" class="btn-primary">+ Yeni Yazı</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="spine"></div>
      <button class="archive-item all-item active" data-filter="all">
        Tüm Yazılar <span class="count" id="allCount">0</span>
      </button>
      <div id="archiveTree" class="archive-tree"></div>
      <div id="tagSection" hidden>
        <div class="sidebar-heading">Etiketler</div>
        <div id="tagChips" class="tag-chips"></div>
      </div>
    </aside>

    <main class="content" id="content">
      <div id="loadingState" class="state-msg">Yazılar yükleniyor...</div>

      <div id="emptyState" class="state-msg" hidden>
        <div class="empty-illustration">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
            <path d="M10 44 L10 10 Q10 6 14 6 L38 6 Q42 6 42 10 L42 44" stroke="#7C2D3B" stroke-width="1.6" fill="none"/>
            <line x1="10" y1="44" x2="42" y2="44" stroke="#7C2D3B" stroke-width="1.6"/>
            <line x1="17" y1="17" x2="35" y2="17" stroke="#2F5D62" stroke-width="1.4"/>
            <line x1="17" y1="24" x2="35" y2="24" stroke="#2F5D62" stroke-width="1.4"/>
            <line x1="17" y1="31" x2="28" y2="31" stroke="#2F5D62" stroke-width="1.4"/>
          </svg>
        </div>
        <p>Henüz bir günlük yazın yok.<br/>İlk yazını ekleyerek başla.</p>
        <button class="btn-primary" id="emptyStateBtn">+ İlk Yazımı Ekle</button>
      </div>

      <div id="timeline" class="timeline"></div>
    </main>
  </div>
</div>

<div id="modalOverlay" class="modal-overlay" hidden>
  <div class="modal">
    <h2 id="modalTitle">Yeni Günlük Yazısı</h2>
    <form id="entryForm">
      <label>Başlık
        <input type="text" id="entryTitleInput" required maxlength="120" placeholder="Bugün ne oldu?" />
      </label>
      <div class="form-row">
        <label>Tarih
          <input type="date" id="entryDateInput" required />
        </label>
        <label>Etiket <span style="font-weight:400;">(opsiyonel)</span>
          <input type="text" id="entryTagInput" maxlength="30" placeholder="Okul, Kişisel, Gezi..." />
        </label>
      </div>
      <label>Yazı
        <textarea id="entryContentInput" rows="8" required maxlength="8000" placeholder="Aklından geçenleri yaz..."></textarea>
      </label>
      <label>Fotoğraf <span style="font-weight:400;">(opsiyonel)</span>
        <input type="file" id="entryPhotoInput" accept="image/*" />
        <img id="photoPreview" class="photo-preview" alt="Önizleme" />
        <button type="button" id="photoRemoveBtn" class="photo-remove-btn">Fotoğrafı kaldır</button>
      </label>
      <div class="form-actions">
        <button type="button" id="cancelBtn" class="btn-ghost">Vazgeç</button>
        <button type="submit" class="btn-primary">Kaydet</button>
      </div>
    </form>
  </div>
</div>

<script>
(function(){
  const AYLAR = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

  const SUPABASE_URL = "https://okdevnqrpowyutcmcpcj.supabase.co";
  const SUPABASE_KEY = "sb_publishable_EIVJwRzA9UCbkmDv5nbBCQ_76gR_Jhs";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let entries = [];
  let currentFilter = "all"; // "all" or "YYYY-MM"
  let currentTag = null;
  let searchTerm = "";
  let editingId = null;
  let selectedPhotoFile = null;
  let removePhotoFlag = false;
  let existingPhotoUrl = null;

  const timelineEl = document.getElementById("timeline");
  const archiveTreeEl = document.getElementById("archiveTree");
  const tagSectionEl = document.getElementById("tagSection");
  const tagChipsEl = document.getElementById("tagChips");
  const allCountEl = document.getElementById("allCount");
  const loadingStateEl = document.getElementById("loadingState");
  const emptyStateEl = document.getElementById("emptyState");
  const modalOverlay = document.getElementById("modalOverlay");
  const entryForm = document.getElementById("entryForm");
  const modalTitle = document.getElementById("modalTitle");
  const titleInput = document.getElementById("entryTitleInput");
  const dateInput = document.getElementById("entryDateInput");
  const tagInput = document.getElementById("entryTagInput");
  const contentInput = document.getElementById("entryContentInput");
  const photoInput = document.getElementById("entryPhotoInput");
  const photoPreview = document.getElementById("photoPreview");
  const photoRemoveBtn = document.getElementById("photoRemoveBtn");

  function fmtDate(iso){
    const [y,m,d] = iso.split("-").map(Number);
    return `${d} ${AYLAR[m-1]} ${y}`;
  }

  function monthKey(iso){
    const [y,m] = iso.split("-");
    return `${y}-${m}`;
  }

  function rowToEntry(row){
    return { id: row.id, title: row.title, date: row.entry_date, tag: row.tag || "", content: row.content, photo: row.photo_url || null };
  }

  async function loadEntries(){
    try{
      const { data, error } = await sb.from('diary_entries').select('*').order('entry_date', { ascending:false });
      if(error) throw error;
      entries = (data || []).map(rowToEntry);
    }catch(err){
      console.error("Yükleme hatası:", err);
      entries = [];
      loadingStateEl.textContent = "Veritabanına bağlanırken bir sorun oldu. İnternet bağlantını kontrol et.";
    }
  }

  async function uploadPhoto(file){
    try{
      const ext = file.name.split('.').pop();
      const path = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
      const { error: upErr } = await sb.storage.from('diary-photos').upload(path, file);
      if(upErr) throw upErr;
      const { data } = sb.storage.from('diary-photos').getPublicUrl(path);
      return data.publicUrl;
    }catch(err){
      console.error("Fotoğraf yükleme hatası:", err);
      alert("Fotoğraf yüklenemedi. Supabase'de 'diary-photos' adında herkese açık bir depolama alanı (bucket) oluşturduğundan emin ol.");
      return null;
    }
  }

  async function insertEntry(data){
    const { data: row, error } = await sb.from('diary_entries')
      .insert({ title: data.title, entry_date: data.date, tag: data.tag || null, content: data.content, photo_url: data.photo || null })
      .select().single();
    if(error){
      console.error("Ekleme hatası:", error);
      alert("Yazı kaydedilemedi. Supabase tablosunun doğru kurulduğundan emin ol ve tekrar dene.");
      return null;
    }
    return rowToEntry(row);
  }

  async function updateEntryRow(id, data){
    const { error } = await sb.from('diary_entries')
      .update({ title: data.title, entry_date: data.date, tag: data.tag || null, content: data.content, photo_url: data.photo || null })
      .eq('id', id);
    if(error){
      console.error("Güncelleme hatası:", error);
      alert("Yazı güncellenemedi. Tekrar dener misin?");
      return false;
    }
    return true;
  }

  async function deleteEntryRow(id){
    const { error } = await sb.from('diary_entries').delete().eq('id', id);
    if(error){
      console.error("Silme hatası:", error);
      alert("Yazı silinemedi. Supabase tablosundaki güvenlik kuralının (RLS policy) silmeye izin verdiğinden emin ol.");
      return false;
    }
    return true;
  }

  function buildArchive(){
    const groups = {}; // year -> { month -> count }
    entries.forEach(e=>{
      const [y,m] = e.date.split("-");
      groups[y] = groups[y] || {};
      groups[y][m] = (groups[y][m] || 0) + 1;
    });
    const years = Object.keys(groups).sort((a,b)=> b.localeCompare(a));
    archiveTreeEl.innerHTML = "";
    years.forEach(y=>{
      const yearWrap = document.createElement("div");
      yearWrap.className = "year-group";
      const yearLabel = document.createElement("div");
      yearLabel.className = "year-label";
      yearLabel.textContent = y;
      yearWrap.appendChild(yearLabel);

      const months = Object.keys(groups[y]).sort((a,b)=> b.localeCompare(a));
      months.forEach(m=>{
        const key = `${y}-${m}`;
        const btn = document.createElement("button");
        btn.className = "archive-item month-item" + (currentFilter===key ? " active" : "");
        btn.dataset.filter = key;
        btn.innerHTML = `${AYLAR[parseInt(m,10)-1]} <span class="count">${groups[y][m]}</span>`;
        btn.addEventListener("click", ()=>{ currentFilter = key; render(); });
        yearWrap.appendChild(btn);
      });
      archiveTreeEl.appendChild(yearWrap);
    });
    allCountEl.textContent = entries.length;
    document.querySelectorAll(".all-item").forEach(el=>{
      el.classList.toggle("active", currentFilter==="all");
    });
  }

  function buildTagFilters(){
    const tagCounts = {};
    entries.forEach(e=>{
      if(e.tag) tagCounts[e.tag] = (tagCounts[e.tag] || 0) + 1;
    });
    const tags = Object.keys(tagCounts).sort((a,b)=> a.localeCompare(b,'tr'));
    if(tags.length === 0){
      tagSectionEl.hidden = true;
      return;
    }
    tagSectionEl.hidden = false;
    tagChipsEl.innerHTML = "";
    tags.forEach(t=>{
      const chip = document.createElement("button");
      chip.className = "tag-chip" + (currentTag===t ? " active" : "");
      chip.textContent = `${t} (${tagCounts[t]})`;
      chip.addEventListener("click", ()=>{
        currentTag = currentTag === t ? null : t;
        render();
      });
      tagChipsEl.appendChild(chip);
    });
  }

  function getVisibleEntries(){
    let list = [...entries];
    if(currentFilter !== "all"){
      list = list.filter(e => monthKey(e.date) === currentFilter);
    }
    if(currentTag){
      list = list.filter(e => e.tag === currentTag);
    }
    if(searchTerm.trim()){
      const q = searchTerm.toLocaleLowerCase('tr-TR');
      list = list.filter(e =>
        e.title.toLocaleLowerCase('tr-TR').includes(q) ||
        e.content.toLocaleLowerCase('tr-TR').includes(q) ||
        (e.tag || "").toLocaleLowerCase('tr-TR').includes(q)
      );
    }
    list.sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
    return list;
  }

  function escapeHtml(str){
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function renderTimeline(){
    const list = getVisibleEntries();
    timelineEl.innerHTML = "";

    if(entries.length === 0){
      emptyStateEl.hidden = false;
      timelineEl.hidden = true;
      return;
    }
    emptyStateEl.hidden = true;
    timelineEl.hidden = false;

    if(list.length === 0){
      timelineEl.innerHTML = `<div class="state-msg">Bu ayda ya da aramada hiç yazı yok.</div>`;
      return;
    }

    list.forEach(e=>{
      const el = document.createElement("div");
      el.className = "entry";
      el.innerHTML = `
        <div class="entry-node"></div>
        <div class="entry-card">
          <div class="entry-header">
            <h3 class="entry-title">${escapeHtml(e.title)}</h3>
            <span class="entry-date">${fmtDate(e.date)}</span>
          </div>
          ${e.tag ? `<span class="entry-tag">${escapeHtml(e.tag)}</span>` : ""}
          ${e.photo ? `<img class="entry-photo" src="${escapeHtml(e.photo)}" alt="${escapeHtml(e.title)}" loading="lazy" />` : ""}
          <div class="entry-content">${escapeHtml(e.content)}</div>
          <div class="entry-actions">
            <button class="icon-btn" data-action="edit" data-id="${e.id}">Düzenle</button>
            <button class="icon-btn danger" data-action="delete" data-id="${e.id}">Sil</button>
          </div>
        </div>
      `;
      timelineEl.appendChild(el);
    });
  }

  function render(){
    buildArchive();
    buildTagFilters();
    renderTimeline();
  }

  function openModal(entry){
    editingId = entry ? entry.id : null;
    modalTitle.textContent = entry ? "Yazıyı Düzenle" : "Yeni Günlük Yazısı";
    titleInput.value = entry ? entry.title : "";
    dateInput.value = entry ? entry.date : new Date().toISOString().slice(0,10);
    tagInput.value = entry ? (entry.tag || "") : "";
    contentInput.value = entry ? entry.content : "";

    selectedPhotoFile = null;
    removePhotoFlag = false;
    existingPhotoUrl = entry ? (entry.photo || null) : null;
    photoInput.value = "";
    if(existingPhotoUrl){
      photoPreview.src = existingPhotoUrl;
      photoPreview.classList.add("show");
      photoRemoveBtn.classList.add("show");
    }else{
      photoPreview.classList.remove("show");
      photoPreview.src = "";
      photoRemoveBtn.classList.remove("show");
    }

    modalOverlay.hidden = false;
    setTimeout(()=> titleInput.focus(), 0);
  }

  function closeModal(){
    modalOverlay.hidden = true;
    editingId = null;
    selectedPhotoFile = null;
    removePhotoFlag = false;
    existingPhotoUrl = null;
    photoPreview.classList.remove("show");
    photoRemoveBtn.classList.remove("show");
    entryForm.reset();
  }

  photoInput.addEventListener("change", ()=>{
    const file = photoInput.files[0];
    if(!file) return;
    selectedPhotoFile = file;
    removePhotoFlag = false;
    const reader = new FileReader();
    reader.onload = ()=>{
      photoPreview.src = reader.result;
      photoPreview.classList.add("show");
      photoRemoveBtn.classList.add("show");
    };
    reader.readAsDataURL(file);
  });

  photoRemoveBtn.addEventListener("click", ()=>{
    selectedPhotoFile = null;
    removePhotoFlag = true;
    photoInput.value = "";
    photoPreview.classList.remove("show");
    photoPreview.src = "";
    photoRemoveBtn.classList.remove("show");
  });

  entryForm.addEventListener("submit", async (ev)=>{
    ev.preventDefault();
    const data = {
      title: titleInput.value.trim(),
      date: dateInput.value,
      tag: tagInput.value.trim(),
      content: contentInput.value.trim(),
      photo: removePhotoFlag ? null : existingPhotoUrl
    };
    if(!data.title || !data.date || !data.content) return;

    const saveBtn = entryForm.querySelector('.btn-primary');
    saveBtn.disabled = true;

    if(selectedPhotoFile){
      saveBtn.textContent = "Fotoğraf yükleniyor...";
      const url = await uploadPhoto(selectedPhotoFile);
      if(url) data.photo = url;
    }

    saveBtn.textContent = "Kaydediliyor...";

    if(editingId){
      const ok = await updateEntryRow(editingId, data);
      if(ok){
        const idx = entries.findIndex(e=>e.id===editingId);
        if(idx > -1) entries[idx] = {...entries[idx], ...data};
      }
    }else{
      const newEntry = await insertEntry(data);
      if(newEntry) entries.push(newEntry);
    }

    saveBtn.disabled = false;
    saveBtn.textContent = "Kaydet";
    closeModal();
    render();
  });

  timelineEl.addEventListener("click", (ev)=>{
    const btn = ev.target.closest("button[data-action]");
    if(!btn) return;
    const id = btn.dataset.id;
    const entry = entries.find(e=>e.id===id);
    if(!entry) return;

    if(btn.dataset.action === "edit"){
      openModal(entry);
    }else if(btn.dataset.action === "delete"){
      if(confirm(`"${entry.title}" yazısını silmek istediğine emin misin?`)){
        deleteEntryRow(id).then(ok=>{
          if(ok){ entries = entries.filter(e=>e.id!==id); render(); }
        });
      }
    }
  });

  document.getElementById("newEntryBtn").addEventListener("click", ()=> openModal(null));
  document.getElementById("emptyStateBtn").addEventListener("click", ()=> openModal(null));
  document.getElementById("cancelBtn").addEventListener("click", closeModal);

  document.getElementById("backupBtn").addEventListener("click", ()=>{
    if(entries.length === 0){
      alert("Henüz yedeklenecek bir yazı yok.");
      return;
    }
    const sorted = [...entries].sort((a,b)=> a.date.localeCompare(b.date));

    // 1) Okunabilir metin dosyası
    let text = "GÜNLÜĞÜM — YEDEK\nİndirilme tarihi: " + new Date().toLocaleDateString('tr-TR') + "\n";
    text += "=".repeat(40) + "\n\n";
    sorted.forEach(e=>{
      text += fmtDate(e.date) + " — " + e.title + (e.tag ? " [" + e.tag + "]" : "") + "\n";
      text += "-".repeat(30) + "\n";
      text += e.content + "\n";
      if(e.photo) text += "\n(Fotoğraf: " + e.photo + ")\n";
      text += "\n\n";
    });
    downloadFile(text, `gunlugum-yedek-${new Date().toISOString().slice(0,10)}.txt`, "text/plain");

    // 2) Makine tarafından okunabilir JSON dosyası (ileride başka bir sisteme aktarmak için)
    downloadFile(JSON.stringify(sorted, null, 2), `gunlugum-yedek-${new Date().toISOString().slice(0,10)}.json`, "application/json");
  });

  function downloadFile(content, filename, mime){
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  modalOverlay.addEventListener("click", (ev)=>{ if(ev.target === modalOverlay) closeModal(); });
  document.addEventListener("keydown", (ev)=>{ if(ev.key === "Escape" && !modalOverlay.hidden) closeModal(); });

  document.querySelector(".all-item").addEventListener("click", ()=>{ currentFilter = "all"; currentTag = null; render(); });

  let searchDebounce;
  document.getElementById("searchInput").addEventListener("input", (ev)=>{
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(()=>{
      searchTerm = ev.target.value;
      renderTimeline();
    }, 150);
  });

  (async function init(){
    await loadEntries();
    loadingStateEl.hidden = true;
    render();
  })();
})();
</script>

</body>
</html>
